name: Chopin CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test & Check
    runs-on: macos-14
    if: |
      github.event_name == 'pull_request' || 
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Run tests
        run: cargo test --verbose --workspace --exclude chopin-pg --exclude chopin-orm
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  # A.8: io-uring feature tests on Linux only
  test-iouring:
    name: Test io-uring (Linux)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Test io-uring feature
        run: cargo test -p chopin-core --features io-uring --lib

  # H.3: chopin-pg integration tests with Docker PostgreSQL
  test-pg:
    name: Test chopin-pg (PostgreSQL)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chopin
          POSTGRES_PASSWORD: chopin
          POSTGRES_DB: chopin_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Run chopin-pg tests
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: chopin
          PG_PASSWORD: chopin
          PG_DATABASE: chopin_test
        run: cargo test -p chopin-pg --lib

  # H.4: Criterion benchmarks smoke check (compile only)
  bench-check:
    name: Benchmark Smoke Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version'))
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Compile benchmarks (no-run)
        run: cargo bench --no-run --workspace 2>&1 || true

  # H.6: Dependency audit for known CVEs
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version'))
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  release:
    name: Release & Publish
    runs-on: macos-14
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      
      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.bump_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
      
      - name: Bump version
        id: new_version
        run: |
          CURRENT=${{ steps.current_version.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "${{ steps.bump_type.outputs.type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Update workspace version
        run: |
          NEW_VER=${{ steps.new_version.outputs.new_version }}
          echo "Updating workspace to $NEW_VER"
          
          # Fix for macOS sed: -i '' is required
          # 1. Update the package version
          sed -i '' "s/^version = \".*\"/version = \"$NEW_VER\"/" Cargo.toml
          
          # 2. Update workspace dependencies
          sed -i '' "s/version = \".*\", path = \"crates/version = \"$NEW_VER\", path = \"crates/g" Cargo.toml
      
      - name: Update Cargo.lock
        run: cargo update --workspace
      
      - name: Publish all crates
        run: |
          if [ -n "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "🚀 Publishing version ${{ steps.new_version.outputs.new_version }} to crates.io..."
            
            # 1. Base components (no internal deps)
            cargo publish -p chopin-macros --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 20
            cargo publish -p chopin-pg --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 20
            cargo publish -p chopin-orm-macro --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 20
            
            # 2. ORM (depends on pg and orm-macro)
            # This must be published before core because core has dev-dependencies on it
            cargo publish -p chopin-orm --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 60
            
            # 3. Core (depends on macros, dev-depends on pg/orm)
            cargo publish -p chopin-core --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 60
            
            # 4. Leaf crates (depend on core)
            cargo publish -p chopin-auth --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 20
            cargo publish -p chopin-cli --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
          else
            echo "⚠️ CARGO_TOKEN not set, skipping publish"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml crates/*/Cargo.toml Cargo.lock || true
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }} [skip ci]" || true
          git tag "v${{ steps.new_version.outputs.new_version }}" || true
          git push origin main || true
          git push origin "v${{ steps.new_version.outputs.new_version }}" || true

  # Fallback for manual tag pushes
  publish-tag:
    name: Publish Manual Tag
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Publish all crates
        run: |
          if [ -n "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "🚀 Publishing tag ${{ github.ref_name }} to crates.io..."
            # 1. Pubish macros first (dependency of core)
            cargo publish -p chopin-macros --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            # 2. Publish core
            cargo publish -p chopin-core --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            # 3. Publish leaf crates
            cargo publish -p chopin-auth --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-pg --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-orm-macro --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-orm --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-cli --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
          else
            echo "❌ CARGO_TOKEN not set"
            exit 1
          fi
