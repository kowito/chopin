name: Chopin CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test & Check
    runs-on: macos-14
    if: |
      github.event_name == 'pull_request' || 
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Run tests
        run: cargo test --verbose --workspace --exclude chopin-pg --exclude chopin-orm
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  release:
    name: Release & Publish
    runs-on: macos-14
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      
      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version = ' crates/chopin-core/Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.bump_type }}" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
      
      - name: Bump version
        id: new_version
        run: |
          CURRENT=${{ steps.current_version.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "${{ steps.bump_type.outputs.type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Update workspace version
        run: |
          NEW_VER=${{ steps.new_version.outputs.new_version }}
          echo "Updating to $NEW_VER"
          for file in crates/*/Cargo.toml; do
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$NEW_VER\"/" "$file" || \
            sed -i "s/^version = \"[^\"]*\"/version = \"$NEW_VER\"/" "$file"
          done
          # Also update internal dependencies
          for file in crates/*/Cargo.toml; do
            sed -i '' "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\", path = \"\.\./version = \"$NEW_VER\", path = \"\.\./" "$file" || \
            sed -i "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\", path = \"\.\./version = \"$NEW_VER\", path = \"\.\./" "$file"
          done
      
      - name: Update Cargo.lock
        run: cargo update --workspace
      
      - name: Publish all crates
        run: |
          if [ -n "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "🚀 Publishing version ${{ steps.new_version.outputs.new_version }} to crates.io..."
            # 1. Pubish macros first (dependency of core)
            cargo publish -p chopin-macros --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 60
            # 2. Publish core
            cargo publish -p chopin-core --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 60
            # 3. Publish leaf crates
            cargo publish -p chopin-auth --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            cargo publish -p chopin-pg --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            cargo publish -p chopin-orm-macro --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            cargo publish -p chopin-orm --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            cargo publish -p chopin-cli --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
          else
            echo "⚠️ CARGO_TOKEN not set, skipping publish"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/*/Cargo.toml Cargo.lock || true
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }} [skip ci]" || true
          git tag "v${{ steps.new_version.outputs.new_version }}" || true
          git push origin main || true
          git push origin "v${{ steps.new_version.outputs.new_version }}" || true

  # Fallback for manual tag pushes
  publish-tag:
    name: Publish Manual Tag
    runs-on: macos-14
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Publish all crates
        run: |
          if [ -n "${{ secrets.CARGO_TOKEN }}" ]; then
            echo "🚀 Publishing tag ${{ github.ref_name }} to crates.io..."
            # 1. Pubish macros first (dependency of core)
            cargo publish -p chopin-macros --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            # 2. Publish core
            cargo publish -p chopin-core --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 30
            # 3. Publish leaf crates
            cargo publish -p chopin-auth --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-pg --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-orm-macro --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-orm --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
            sleep 10
            cargo publish -p chopin-cli --token ${{ secrets.CARGO_TOKEN }} --no-verify --allow-dirty || true
          else
            echo "❌ CARGO_TOKEN not set"
            exit 1
          fi
